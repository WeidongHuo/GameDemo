<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>游戏 DEMO 展示</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="ambient-home">
    <div class="ambient-scene" aria-hidden="true">
      <div class="ambient-base"></div>
      <div class="ambient-forgive-light"></div>
      <div class="ambient-red-wash"></div>
      <div class="ambient-vignette"></div>
    </div>

    <header class="site-header">
      <div class="header-inner">
        <a class="logo" href="index.html">
          <img class="logo-mark" src="图片/LOGO.png" alt="" width="1254" height="1254" decoding="async" />
          <span>Game Demos</span>
        </a>
        <nav class="nav" aria-label="游戏导航">
          <a class="nav-link" href="stillwater.html" data-bg-target="stillwater">StillWater</a>
          <a class="nav-link" href="#forgive-me" data-bg-target="forgive">Forgive Me</a>
        </nav>
        <button class="lang-toggle" type="button" data-lang-toggle aria-label="Switch language">EN</button>
      </div>
    </header>

    <main id="top">
      <section class="hero">
        <h1 data-i18n data-zh="原创游戏 DEMO 展示" data-en="Original Game Demo Showcase">原创游戏 DEMO 展示</h1>
      </section>

      <section class="demo-grid" aria-label="游戏 Demo 列表">
        <a class="demo-card demo-card-primary" href="stillwater.html" aria-label="进入 StillWater 页面" data-bg-target="stillwater">
          <span class="demo-media">
            <img src="图片/StillWater展示图.png" alt="StillWater 游戏展示图" width="1672" height="941" decoding="async" />
          </span>
          <span class="demo-card-body">
            <span class="demo-title">StillWater</span>
            <span class="demo-copy" data-i18n data-zh="孤岛谋杀、时间循环与无法坦白的居民。" data-en="An island murder, a time loop, and residents who will not tell the whole truth.">孤岛谋杀、时间循环与无法坦白的居民。</span>
            <span class="demo-meta" data-i18n data-zh="版本-V0.1.0" data-en="Version-V0.1.0">版本-V0.1.0</span>
          </span>
        </a>

        <article id="forgive-me" class="demo-card demo-card-muted" data-bg-target="forgive" tabindex="0">
          <span class="demo-media">
            <img src="图片/ForGiveMe.png" alt="Forgive Me 展示图" width="775" height="768" loading="lazy" decoding="async" />
          </span>
          <span class="demo-card-body">
            <span class="demo-title">Forgive Me</span>
            <span class="demo-copy" data-i18n data-zh="展示页准备中。" data-en="Showcase page in preparation.">展示页准备中。</span>
            <span class="demo-meta">Coming Soon</span>
          </span>
        </article>
      </section>
    </main>

    <footer class="site-footer">
      <p data-i18n data-zh="姓名：Weidong Huo 电话：8732881075 邮箱：Ralph19990211@gmail.com" data-en="Name: Weidong Huo Phone: 8732881075 Email: Ralph19990211@gmail.com">姓名：Weidong Huo 电话：8732881075 邮箱：Ralph19990211@gmail.com</p>
    </footer>
    <script src="app.js"></script>
  </body>
</html>
